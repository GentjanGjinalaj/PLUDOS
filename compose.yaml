services:
  # 1. The Time-Series Database (For Alumet Energy Metrics)
  influxdb:
    image: influxdb:latest
    container_name: pludos-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=pludos_admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=pludos_password123
      - DOCKER_INFLUXDB_INIT_ORG=pludos_research
      - DOCKER_INFLUXDB_INIT_BUCKET=energy_metrics
    restart: always

  # 2. The Analytics Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: pludos-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb
    restart: always

volumes:
  influxdb_data:
  grafana_data: