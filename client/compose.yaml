services:
  # 0. Zero-Touch Provisioning VPN (Jetson <-> Server only)
  tailscale:
    image: docker.io/tailscale/tailscale:stable
    container_name: pludos-tailscale
    hostname: pludos-jetson
    profiles:
      - vpn
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
    cap_add:
      - net_admin
      - sys_module
    volumes:
      - /dev/net/tun:/dev/net/tun
      - tailscale_data:/var/lib/tailscale
    restart: unless-stopped

  # 1. The CoAP Data Engine (STM32 <-> Jetson local WiFi path)
  # network_mode: host — required for UDP broadcast beacon to reach the local subnet,
  # and avoids CNI firewall plugin version mismatch on rootless Podman (JetPack 6).
  # No profiles: runs in all modes (vpn, standalone, headless, plain up).
  data-engine:
    build: .
    container_name: pludos-data-engine
    command: python3 data-engine.py
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./ram_buffer:/app/ram_buffer
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped

  # 2. The AI Worker (Jetson <-> Server relay path via Tailscale in federated mode;
  #    local retrain loop in standalone mode — controlled by PLUDOS_MODE env var).
  ai-worker:
    build: .
    container_name: pludos-ai-worker
    hostname: ${JETSON_HOSTNAME:-jetson}   # sets socket.gethostname() → InfluxDB device tag
    command: python3 client.py
    # network_mode: host — required to reach alumet-relay's Prometheus endpoint on
    # localhost:9095; without this the container is in a CNI namespace and the scrape
    # hits a dead socket, forcing every FL round into DEGRADED mode (T-A1).
    network_mode: host
    env_file:
      - .env
    profiles:
      - vpn
      - standalone
    # GPU note: CDI device passthrough (nvidia.com/gpu=all) requires Podman ≥ 4.1.
    # Jetson currently runs Podman 3.4.4 (JetPack 5.x). XGBoost auto-detects
    # GPU availability at startup and falls back to CPU if CUDA is inaccessible.
    # Upgrade path: podman ≥ 4.1 + nvidia-ctk cdi generate → add devices: [nvidia.com/gpu=all]
    volumes:
      - ./ram_buffer:/app/ram_buffer
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      data-engine:
        condition: service_started
      alumet-relay:
        condition: service_healthy
    restart: unless-stopped

  # 3. Alumet relay sidecar — ADR-011 Phase 2
  # Reads Jetson INA3221 power rails via the nvidia-jetson plugin.
  # Exposes a local Prometheus endpoint on ALUMET_PROMETHEUS_PORT (default 9095)
  # that client.py AlumetProfiler scrapes for real-time per-phase energy data.
  # Also writes to server InfluxDB (alumet_energy bucket) when INFLUXDB_TOKEN is set.
  #
  # First build compiles Rust from source (~20–30 min on Jetson). Subsequent starts
  # use the cached image. Image must be built before this service can start:
  #   podman-compose build alumet-relay
  #
  # network_mode: host — avoids CNI firewall plugin version mismatch on rootless
  # Podman (JetPack 5.x). Port 9095 is bound directly on the host; data-engine
  # and client.py reach it at localhost:9095 with no CNI involved.
  # No profiles: runs in all modes (the healthcheck guards ai-worker regardless).
  alumet-relay:
    build:
      context: ./alumet-relay
      dockerfile: Containerfile
    container_name: pludos-alumet-relay
    network_mode: host
    env_file:
      - .env
    environment:
      - ALUMET_SERVER_ADDR=${ALUMET_SERVER_ADDR:-}
      - ALUMET_PROMETHEUS_PORT=${ALUMET_PROMETHEUS_PORT:-9095}
    privileged: true
    volumes:
      # Full sysfs access required for INA3221 and RAPL reads.
      - /sys:/sys:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      # Persistent alumet log files — visible on host at client/logs/alumet/.
      - ./logs/alumet:/app/logs
    # T4.1: expose readiness so ai-worker doesn't try to scrape before alumet-agent is up.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9095/metrics"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # 4. Local InfluxDB — standalone profile only (T5.2)
  # Provides a local time-series store when no central server is reachable.
  # 7-day retention keeps eMMC usage bounded on the Jetson.
  # Set INFLUXDB_URL=http://localhost:8086 in .env when using standalone mode.
  influxdb-local:
    image: docker.io/library/influxdb:2.7
    container_name: pludos-influxdb-local
    profiles:
      - standalone
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=pludos-local
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-pludos}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-alumet_energy}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-pludos-secret-token}
      - DOCKER_INFLUXDB_INIT_RETENTION=168h   # 7 days
    volumes:
      - influxdb_local_data:/var/lib/influxdb2
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  # 5. Local Grafana — standalone profile only (T5.2)
  # Read-only local dashboard connected to influxdb-local.
  # Access at http://localhost:3000 (default admin/admin — rotate before production).
  grafana-local:
    image: docker.io/grafana/grafana:10.4.3
    container_name: pludos-grafana-local
    profiles:
      - standalone
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_local_data:/var/lib/grafana
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - influxdb-local
    restart: unless-stopped

# ram_buffer is a bind-mount on ./ram_buffer so it works in rootless Podman
# without tmpfs privileges and is directly inspectable on the host.
# power_metrics volume removed — probe.py is gone, alumet-cli writes directly.
volumes:
  # tailscale_data must persist across container restarts to keep Tailscale auth.
  tailscale_data:
  # standalone-mode local storage — Jetson eMMC, 7-day retention enforced by InfluxDB.
  influxdb_local_data:
  grafana_local_data:
