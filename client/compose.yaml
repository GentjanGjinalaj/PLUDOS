services:
  # 0. Zero-Touch Provisioning VPN (Jetson <-> Server only)
  tailscale:
    image: tailscale/tailscale:v1.66.0
    container_name: pludos-tailscale
    hostname: pludos-jetson
    profiles:
      - vpn
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
    cap_add:
      - net_admin
      - sys_module
    volumes:
      - /dev/net/tun:/dev/net/tun
      - tailscale_data:/var/lib/tailscale
    restart: unless-stopped

  # 1. The CoAP Data Engine (STM32 <-> Jetson local WiFi path)
  data-engine:
    build: .
    container_name: pludos-data-engine
    command: python3 data-engine.py
    ports:
      - "5683:5683/udp"   # CoAP CON — CriticalPayload (aiocoap)
      - "5684:5684/udp"   # raw UDP — NonCriticalPayload (separate socket, avoids aiocoap collision)
      - "5000:5000/udp"   # UDP Broadcast Beacon for STM32 discovery (P2-1, stubbed)
    volumes:
      - shared_ram_buffer:/app/ram_buffer
    restart: unless-stopped

  # 2. The AI Worker (Jetson <-> Server relay path via Tailscale)
  ai-worker:
    build: .
    container_name: pludos-ai-worker
    command: python3 client.py
    profiles:
      - vpn
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - shared_ram_buffer:/app/ram_buffer
    depends_on:
      - data-engine
      - tailscale
    restart: unless-stopped

# This creates a RAM-disk. It saves data to memory, NOT the physical SD card.
volumes:
  shared_ram_buffer:
    driver_opts:
      type: tmpfs
      device: tmpfs
  tailscale_data: