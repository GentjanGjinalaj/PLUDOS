services:
  # 0. Zero-Touch Provisioning VPN (Jetson <-> Server only)
  tailscale:
    image: docker.io/tailscale/tailscale:stable
    container_name: pludos-tailscale
    hostname: pludos-jetson
    profiles:
      - vpn
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
    cap_add:
      - net_admin
      - sys_module
    volumes:
      - /dev/net/tun:/dev/net/tun
      - tailscale_data:/var/lib/tailscale
    restart: unless-stopped

  # 1. The CoAP Data Engine (STM32 <-> Jetson local WiFi path)
  # network_mode: host — required for UDP broadcast beacon to reach the local subnet,
  # and avoids CNI firewall plugin version mismatch on rootless Podman (JetPack 6).
  data-engine:
    build: .
    container_name: pludos-data-engine
    command: python3 data-engine.py
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./ram_buffer:/app/ram_buffer
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      # tegrastats bind-mount: lets client.py AlumetProfiler read Jetson power rails.
      # The binary is host-only; container image (python:3.10-slim) does not include it.
      - /usr/bin/tegrastats:/usr/bin/tegrastats:ro
    restart: unless-stopped

  # 2. The AI Worker (Jetson <-> Server relay path via Tailscale)
  ai-worker:
    build: .
    container_name: pludos-ai-worker
    hostname: ${JETSON_HOSTNAME:-jetson}   # sets socket.gethostname() → InfluxDB device tag
    command: python3 client.py
    env_file:
      - .env
    profiles:
      - vpn
    # GPU note: CDI device passthrough (nvidia.com/gpu=all) requires Podman ≥ 4.1.
    # Jetson currently runs Podman 3.4.4 (JetPack 5.x). XGBoost auto-detects
    # GPU availability at startup and falls back to CPU if CUDA is inaccessible.
    # Upgrade path: podman ≥ 4.1 + nvidia-ctk cdi generate → add devices: [nvidia.com/gpu=all]
    volumes:
      - ./ram_buffer:/app/ram_buffer
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /usr/bin/tegrastats:/usr/bin/tegrastats:ro
    depends_on:
      - data-engine
      - tailscale
    restart: unless-stopped

  # 3. Alumet relay sidecar — ADR-011 Phase 2
  # Gated behind the 'energy' profile so plain `podman-compose up data-engine`
  # skips this service. First build compiles Rust from source (20–30 min on Jetson).
  # Start with: podman-compose --profile energy up alumet-relay
  #
  # alumet-agent reads INA3221 natively via the nvidia-jetson plugin.
  # Local mode  (ALUMET_SERVER_ADDR unset): writes directly to server InfluxDB.
  # Relay mode  (ALUMET_SERVER_ADDR set):   forwards stream to server Alumet over gRPC.
  # See ADR-011 in docs/decisions.md and docs/DEPLOYMENT_CHECKLIST.md for activation steps.
  alumet-relay:
    build:
      context: ./alumet-relay
      dockerfile: Containerfile
    container_name: pludos-alumet-relay
    profiles:
      - energy
    env_file:
      - .env
    environment:
      - ALUMET_SERVER_ADDR=${ALUMET_SERVER_ADDR:-}
    privileged: true
    volumes:
      # INA3221 hardware power monitor: read-only sysfs access from host.
      - /sys:/sys:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped

# ram_buffer is a bind-mount on ./ram_buffer so it works in rootless Podman
# without tmpfs privileges and is directly inspectable on the host.
# power_metrics volume removed — probe.py is gone, alumet-cli writes directly.
volumes:
  # tailscale_data must persist across container restarts to keep Tailscale auth.
  tailscale_data:
