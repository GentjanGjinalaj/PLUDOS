services:
  # 0. Zero-Touch Provisioning VPN (Jetson <-> Server only)
  tailscale:
    image: tailscale/tailscale:v1.66.0
    container_name: pludos-tailscale
    hostname: pludos-jetson
    profiles:
      - vpn
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
    cap_add:
      - net_admin
      - sys_module
    volumes:
      - /dev/net/tun:/dev/net/tun
      - tailscale_data:/var/lib/tailscale
    restart: unless-stopped

  # 1. The CoAP Data Engine (STM32 <-> Jetson local WiFi path)
  # network_mode: host — required for UDP broadcast beacon to reach the local subnet,
  # and avoids CNI firewall plugin version mismatch on rootless Podman (JetPack 6).
  data-engine:
    build: .
    container_name: pludos-data-engine
    command: python3 data-engine.py
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./ram_buffer:/app/ram_buffer
    restart: unless-stopped

  # 2. The AI Worker (Jetson <-> Server relay path via Tailscale)
  ai-worker:
    build: .
    container_name: pludos-ai-worker
    hostname: ${JETSON_HOSTNAME:-jetson}   # sets socket.gethostname() → InfluxDB device tag
    command: python3 client.py
    env_file:
      - .env
    profiles:
      - vpn
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./ram_buffer:/app/ram_buffer
      - power_metrics:/app/power_metrics   # reads INA3221 data from alumet-relay probe
    depends_on:
      - data-engine
      - tailscale
    restart: unless-stopped

  # 3. Alumet relay sidecar — ADR-011 Phase 2 (INA3221 → shared file + gRPC relay to server)
  # Probe-only mode (no ALUMET_SERVER_ADDR): reads INA3221 sysfs at 10 Hz, writes
  # /app/power_metrics/latest.json so ai-worker gets accurate power readings.
  # Full relay mode (ALUMET_SERVER_ADDR set): also forwards stream to server Alumet via gRPC.
  # Runs without vpn profile — probe mode works on local WiFi without Tailscale.
  alumet-relay:
    build:
      context: ./alumet-relay
      dockerfile: Containerfile
    container_name: pludos-alumet-relay
    env_file:
      - .env
    environment:
      # Set in .env to activate gRPC relay forwarding to server (requires Tailscale).
      - ALUMET_SERVER_ADDR=${ALUMET_SERVER_ADDR:-}
    volumes:
      # INA3221 hardware power monitor: read-only sysfs access from host.
      - /sys/bus/i2c/drivers/ina3221:/sys/bus/i2c/drivers/ina3221:ro
      # Shared power metrics file: probe writes, ai-worker reads.
      - power_metrics:/app/power_metrics
    restart: unless-stopped

# ram_buffer is a bind-mount on ./ram_buffer (not a named volume) so it works in
# rootless Podman without tmpfs privileges and is directly inspectable on the host.
volumes:
  # Ephemeral latest.json written by alumet-relay probe, read by ai-worker.
  power_metrics:
    driver_opts:
      type: tmpfs
      device: tmpfs
  # tailscale_data is persistent — survives container restart, keeps auth state.
  tailscale_data:
