services:
  # The Time-Series Database (Catches Alumet's high-speed data)
  influxdb:
    image: influxdb:2.7
    container_name: pludos-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=pludos
      - DOCKER_INFLUXDB_INIT_BUCKET=alumet_energy
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=pludos-secret-token
    restart: always

  # The Visualization Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: pludos-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - influxdb
    restart: always

volumes:
  influxdb_data:
  grafana_data:
