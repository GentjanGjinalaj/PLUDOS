services:
  # Time-series database — catches Alumet energy telemetry
  influxdb:
    image: influxdb:2.7
    container_name: pludos-influxdb
    env_file: .env
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    # Healthcheck is consumed by fl-trigger's depends_on so it doesn't start
    # polling before the bucket is provisioned.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  # Grafana — energy dashboards (fl_energy measurement, per round / per device)
  grafana:
    image: grafana/grafana:10.4.3
    container_name: pludos-grafana
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      # Anonymous viewer access — anyone who can reach port 3000 can see dashboards
      # without logging in. Admins still log in at /login for edit access.
      # Combine with `tailscale funnel 3000` to publish a read-only public URL.
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_ANON_ENABLED:-true}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    depends_on:
      - influxdb
    restart: unless-stopped

  # Alumet — server-side energy profiler (ADR-011)
  # Phase 1: measures server CPU energy via RAPL during FL round aggregation.
  # Phase 2 (open): receives metric relay streams from Jetson Alumet instances
  #   over gRPC on ALUMET_RELAY_PORT (50051). Requires the Jetson-side relay
  #   sidecar to be deployed first (see ADR-011 in docs/decisions.md).
  #
  # RAPL requires access to /sys/class/powercap from the host. The volume
  # mount below is read-only. If RAPL is not available (AMD, VM, CI), Alumet
  # falls back to process-level CPU stats.
  alumet:
    build:
      context: ./alumet
      dockerfile: Containerfile
    container_name: pludos-alumet
    env_file: .env
    environment:
      # InfluxDB write target — uses internal bridge name, not localhost
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      # Device tag written to every InfluxDB point for multi-server dashboards
      - ALUMET_DEVICE_TAG=server
      # Phase 2: relay port (Jetson Alumet relays forward metrics here)
      - ALUMET_RELAY_PORT=${ALUMET_RELAY_PORT:-50051}
    volumes:
      # Read-only RAPL sysfs for server CPU energy measurement
      - /sys/class/powercap:/sys/class/powercap:ro
    ports:
      # gRPC relay port — Jetson alumet-relay sidecars forward INA3221 streams here.
      - "${ALUMET_RELAY_PORT:-50051}:50051"
      # Prometheus scrape endpoint — Grafana pulls live energy metrics from here.
      - "9091:9091"
    depends_on:
      - influxdb
    restart: unless-stopped

  # FL Trigger — watches InfluxDB for ready gateways and launches `flwr run .`
  # autonomously. Replaces the manual `flwr run .` step from the operator
  # workflow. See server/trigger/trigger.py and docs/DEPLOYMENT_GUIDE.md §3.8.
  fl-trigger:
    build:
      context: ./trigger
      dockerfile: Containerfile
    container_name: pludos-fl-trigger
    env_file: .env
    environment:
      # Use the internal compose bridge name — fl-trigger and influxdb share the network.
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - FL_TRIGGER_INTERVAL_S=${FL_TRIGGER_INTERVAL_S:-30}
      - FL_MIN_FIT_CLIENTS=${FL_MIN_FIT_CLIENTS:-1}
      - FL_NUM_ROUNDS=${FL_NUM_ROUNDS:-3}
    volumes:
      # PLUDOS repo, read-only — trigger only invokes `flwr run .`, never writes here.
      - ../:/app/project:ro
      # State: pidfile, last_run.json, per-round logs. Survives container restart.
      - fl_trigger_state:/app/state
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  influxdb_data:
  grafana_data:
  fl_trigger_state:
